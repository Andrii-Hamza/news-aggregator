# ===========================
# NEWS AGGREGATOR CONFIG
# ===========================

# Server
server:
  port: 8580

# PostgreSQL Database
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/news_aggregator
    username: root
    password: root
    driver-class-name: org.postgresql.Driver

# JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

# Thymeleaf
  thymeleaf:
    cache: false

# ===========================
# RSS FEED CONFIGURATION
# ===========================
# Poll interval in milliseconds (120000 = 2 minutes)
rss:
  poll:
    interval: 120000
# Maximum articles to keep in database
  max:
    articles: 12

# RSS feed sources
  feeds:
    # === WORLD / BREAKING NEWS ===
    - name: BBC World
      url: http://feeds.bbci.co.uk/news/world/rss.xml

    - name: BBC Business
      url: http://feeds.bbci.co.uk/news/business/rss.xml

    - name: Al Jazeera
      url: https://www.aljazeera.com/xml/rss/all.xml

    - name: The Guardian World
      url: https://www.theguardian.com/world/rss

    - name: DW News
      url: https://rss.dw.com/xml/rss-en-all

    - name: France24
      url: https://www.france24.com/en/rss

    - name: UN News
      url: https://news.un.org/feed/subscribe/en/news/all/rss.xml

    # === ECONOMIC / FINANCIAL ===
    - name: CNBC Economy
      url: https://search.cnbc.com/rs/search/combinedcms/view.xml?partnerId=wrss01&id=20910258

    - name: MarketWatch
      url: https://feeds.marketwatch.com/marketwatch/topstories/

    - name: The Guardian Business
      url: https://www.theguardian.com/uk/business/rss

    # === MILITARY / DEFENSE ===
    - name: The War Zone
      url: https://www.thedrive.com/the-war-zone/feed

    - name: Google News - Military
      url: https://news.google.com/rss/search?q=military+OR+war+OR+defense&hl=en-US&gl=US&ceid=US:en
      googleNews: true

    # === AGGREGATED ===
    - name: Google News - Top Stories
      url: https://news.google.com/rss?hl=en-US&gl=US&ceid=US:en
      googleNews: true
